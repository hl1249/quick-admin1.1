<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Admin 数据库安装</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f7fb;
        color: #1f2937;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei",
          sans-serif;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 18px 60px rgb(15 23 42 / 10%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #64748b;
      }

      .warning {
        margin: 24px 0;
        padding: 14px 16px;
        border-radius: 12px;
        background: #fff7ed;
        color: #9a3412;
      }

      .status-card {
        margin-top: 24px;
        padding: 14px 16px;
        border-radius: 12px;
        background: #eff6ff;
        color: #1d4ed8;
        font-weight: 600;
      }

      .status-card.success {
        background: #ecfdf5;
        color: #047857;
      }

      .status-card.error {
        background: #fef2f2;
        color: #b91c1c;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 12px 18px;
        cursor: pointer;
        color: #fff;
        background: #2563eb;
        font-size: 15px;
      }

      button.secondary {
        color: #1f2937;
        background: #e5e7eb;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      pre {
        min-height: 160px;
        max-height: 320px;
        margin: 24px 0 0;
        padding: 16px;
        overflow: auto;
        border-radius: 12px;
        background: #0f172a;
        color: #d1e7ff;
        font-size: 13px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Quick Admin 数据库安装</h1>
      <p>
        这个页面会调用 NestJS 接口，把项目 <code>db</code> 目录中的
        <code>qa-*.json</code> 初始化到当前 MongoDB 数据库。
      </p>

      <div class="warning">
        页面会自动检测当前 MongoDB 是否已经存在 <code>quickAdmin</code>
        数据库；不存在时请确认后手动点击安装。
      </div>

      <div id="statusText" class="status-card">正在检测数据库状态...</div>

      <label>
        <input id="confirm" type="checkbox" />
        我确认要手动执行数据库安装
      </label>

      <div class="actions">
        <button id="install" disabled>安装数据库</button>
        <button class="secondary" id="status">查看状态</button>
      </div>

      <pre id="output">等待操作...</pre>
    </main>

    <script>
      const installButton = document.querySelector("#install");
      const statusButton = document.querySelector("#status");
      const confirmInput = document.querySelector("#confirm");
      const statusText = document.querySelector("#statusText");
      const output = document.querySelector("#output");
      let databaseExists = false;

      confirmInput.addEventListener("change", () => {
        installButton.disabled = databaseExists || !confirmInput.checked;
      });

      statusButton.addEventListener("click", async () => {
        await checkStatus();
      });

      installButton.addEventListener("click", async () => {
        const ok = window.confirm("确定要执行数据库安装吗？");
        if (!ok) return;

        installButton.disabled = true;
        await installDatabase();
      });

      checkStatus();

      async function checkStatus() {
        setStatus("正在检测数据库状态...");
        const status = await request("/api/setup/status", { method: "GET" });
        if (!status) return;

        databaseExists = Boolean(status.databaseExists);
        if (databaseExists) {
          setStatus(`${status.database} 数据库已经存在。`, "success");
          installButton.disabled = true;
          return;
        }

        setStatus(`${status.database} 数据库不存在，请确认后手动安装。`);
        installButton.disabled = !confirmInput.checked;
      }

      async function installDatabase() {
        const result = await request("/api/setup/install", { method: "POST" });
        if (!result) return;

        databaseExists = Boolean(result.installed) || Boolean(result.skipped);
        setStatus(result.message || "数据库安装完成。", "success");
        installButton.disabled = true;
      }

      async function request(url, options) {
        output.textContent = "请求中...";

        try {
          const response = await fetch(url, {
            headers: { "Content-Type": "application/json" },
            ...options,
          });
          const result = await response.json();
          const data = result && typeof result === "object" && "data" in result ? result.data : result;
          output.textContent = JSON.stringify(result, null, 2);
          return data;
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          setStatus(message, "error");
          output.textContent = message;
          return null;
        }
      }

      function setStatus(message, type) {
        statusText.textContent = message;
        statusText.className = `status-card${type ? ` ${type}` : ""}`;
      }
    </script>
  </body>
</html>
